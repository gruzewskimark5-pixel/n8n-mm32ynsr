# Use this Blueprint to deploy n8n on Render as a web
# service that uses a Postgres database to store
# workflow data.
#
# This Blueprint uses free instance types (specified by
# `plan`) for both the web service and the database. You
# can upgrade to paid instance types at any time to
# increase resources.

services:
  - type: web
    plan: free
    # This is the runtime for services that pull a prebuilt Docker image
    runtime: image
    # You can give the service any name
    name: n8n-service
    image:
      # Pulls the n8n image tagged as latest from Docker Hub
      url: docker.io/n8nio/n8n:latest

    # The path of the service's health check endpoint for zero-downtime deploys.
    healthCheckPath: /healthz/readiness

    # All environment variables defined below are required!
    #
    # You can define additional environment variables as needed.
    envVars:
      # Generates a base64-encoded key for
      # encrypting credentials in n8n
      #
      # Do not modify this value after it's generated!
      # If you do, you'll lose access to all credentials
      # encrypted with the previous value.
      - key: N8N_ENCRYPTION_KEY
        generateValue: true

      # Sets n8n to run all workflows in the main process to
      # optimize performance and reduce memory overhead.
      - key: EXECUTIONS_PROCESS
        value: main

      # Improves performance for frequently triggered workflows by caching
      # definitions in memory and avoiding repeated database lookups.
      - key: N8N_WORKFLOW_RUN_LOCAL_CACHE
        value: "true"

      # Disables telemetry to reduce background overhead and network calls.
      - key: N8N_DIAGNOSTICS_ENABLED
        value: "false"

      # Enables version check notifications to ensure you're aware of
      # security updates and new n8n releases. While disabling this
      # reduces minor background overhead, security awareness takes
      # precedence over micro-optimizations on Render's free tier.
      - key: N8N_VERSION_NOTIFICATIONS_ENABLED
        value: "true"

      # Disables the workflow template library to reduce idle memory
      # consumption and background CPU/network overhead. This is critical
      # for stability on Render's 512MB free tier.
      - key: N8N_TEMPLATES_ENABLED
        value: "false"

      # Disables the community nodes library to reduce background overhead
      # and idle resource consumption.
      - key: N8N_COMMUNITY_PACKAGES_ENABLED
        value: "false"

      # Disables the personalization flow to reduce initial setup overhead,
      # background network calls, and idle resource consumption.
      - key: N8N_PERSONALIZATION_ENABLED
        value: "false"

      # Disables the n8n task runners to optimize memory on Render's 512MB
      # free tier. This ensures that Code nodes and other tasks run within
      # the main process rather than spawning separate child processes,
      # significantly reducing memory overhead.
      - key: N8N_RUNNERS_ENABLED
        value: "false"

      # Disables the onboarding flow to reduce initial setup overhead,
      # background network calls, and idle resource consumption.
      - key: N8N_ONBOARDING_FLOW_DISABLED
        value: "true"

      # Disables the hiring banner in the console to reduce startup noise
      # and minor background processing overhead.
      - key: N8N_HIRING_BANNER_ENABLED
        value: "false"

      # Sets the release type to stable to remove the '[DEV]' prefix from the
      # browser tab and ensure n8n runs in a production-optimized mode.
      - key: N8N_RELEASE_TYPE
        value: stable

      # For n8n on Render's free tier (512MB RAM), set N8N_LOG_LEVEL to warn
      # to reduce CPU and I/O overhead by suppressing non-critical information
      # logs during workflow executions while preserving critical troubleshooting data.
      # Change this value to "info" or "debug" for more detailed logging.
      - key: N8N_LOG_LEVEL
        value: warn

      # Offloads binary data from RAM to disk. This is critical for the 512MB
      # free tier to prevent OOM crashes when processing files, images, or
      # large payloads, ensuring stability during file-heavy workflows.
      - key: N8N_DEFAULT_BINARY_DATA_MODE
        value: filesystem

      # Optimized memory management for Render's 512MB free tier.
      # Setting max-old-space-size ensures Node.js triggers garbage collection
      # proactively, preventing OOM kills while leaving headroom for the stack.
      - key: NODE_OPTIONS
        value: --max-old-space-size=384

      # Enable more aggressive execution data pruning to keep the database lean.
      # This prevents the 1GB free tier database from filling up and maintains
      # high performance by reducing index size and query latency.
      - key: EXECUTIONS_DATA_PRUNE
        value: "true"
      - key: EXECUTIONS_DATA_MAX_AGE
        value: "168" # 7 days
      - key: EXECUTIONS_DATA_PRUNE_MAX_COUNT
        value: "1000"

      # Enables automatic pruning of workflow history versions by age and
      # count to manage database storage. This keeps the 'workflow_history'
      # table from bloating Render's 1GB free tier database.
      - key: N8N_WORKFLOW_HISTORY_PRUNE_TIME
        value: "168" # 7 days
      - key: N8N_WORKFLOW_HISTORY_PRUNE_LIMIT
        value: "10"

      # Automatically deactivates workflows after repeated failures to prevent
      # continuous resource consumption (CPU/RAM) from broken workflows.
      - key: N8N_WORKFLOW_AUTODEACTIVATION_ENABLED
        value: "true"
      - key: N8N_WORKFLOW_AUTODEACTIVATION_MAX_LAST_EXECUTIONS
        value: "3"

      # To significantly reduce database I/O and storage consumption on Render's
      # free tier (1GB limit), set EXECUTIONS_DATA_SAVE_ON_SUCCESS to "none" and
      # disable progress/manual execution saves. This ensures n8n only persists
      # data for failed production workflow executions, minimizing unnecessary
      # database writes.
      - key: EXECUTIONS_DATA_SAVE_ON_SUCCESS
        value: "none"
      - key: EXECUTIONS_DATA_SAVE_ON_PROGRESS
        value: "false"
      - key: EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS
        value: "false"

      # These automatically populate connection details 
      # for the Render Postgres database defined below
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_DATABASE
        fromDatabase:
          name: n8n-db
          property: database
      - key: DB_POSTGRESDB_HOST
        fromDatabase:
          name: n8n-db
          property: host
      - key: DB_POSTGRESDB_PASSWORD
        fromDatabase:
          name: n8n-db
          property: password
      - key: DB_POSTGRESDB_USER
        fromDatabase:
          name: n8n-db
          property: user

      # Optimized database connection pool size for improved concurrency.
      # Increasing this from the default (2) to 10 reduces connection
      # acquisition latency and improves overall system throughput.
      # A value of 10 is used to stay well within Render's connection
      # limit while providing headroom for background tasks.
      - key: DB_POSTGRESDB_POOL_SIZE
        value: "10"

      # Reduces idle background heartbeat overhead between n8n and the database,
      # which is beneficial for resource-constrained environments like Render Free Tier.
      - key: DB_PING_INTERVAL_SECONDS
        value: "60"

      # Prevents the service from becoming unresponsive or crashing during
      # high-load periods by limiting concurrent production executions.
      # This prevents event loop thrashing and ensures each execution has
      # sufficient CPU and RAM. A lower limit of 2 is used to ensure stability
      # on Render's 512MB free tier.
      - key: N8N_CONCURRENCY_PRODUCTION_LIMIT
        value: "2"

      # To prevent runaway workflows from indefinitely consuming CPU and RAM
      # on Render's 512MB free tier, these variables set a global execution
      # timeout of 1 hour (3600 seconds).
      - key: N8N_EXECUTIONS_TIMEOUT
        value: "3600"
      - key: N8N_EXECUTIONS_TIMEOUT_MAX
        value: "3600"

      # Speeds up service shutdown and container lifecycle in ephemeral
      # environments like Render Free Tier by skipping unnecessary
      # external API calls to deregister webhooks.
      - key: N8N_SKIP_WEBHOOK_DEREGISTRATION_ON_SHUTDOWN
        value: "true"

      # The default port n8n listens on.
      # Explicitly setting this speeds up your first deploy!
      - key: PORT
        value: 5678

      # Sets the timezone for your n8n instance.
      # This is important for accurate scheduling in your workflows.
      # See https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
      # for a list of valid TZ values.
      # - key: GENERIC_TIMEZONE
      #   value: Europe/Berlin

      # If you use webhook nodes or OAuth2 (e.g., Google, Slack), set this
      # manually to your service URL after your first deployment.
      # You can find your URL at the top of the service page or under
      # the 'Connect' button in the Render Dashboard:
      # https://dashboard.render.com/
      #
      # Note: Do not include a trailing slash or port number.
      # - key: WEBHOOK_URL
      #   value: https://replace-with-your-url.onrender.com

databases:
  - name: n8n-db
    plan: free # Note: Free databases expire and are DELETED after 30 days.
    # The free instance type is limited to 1 GB of disk
    # space.
    #
    # If you later upgrade to a paid instance type, you can
    # increase the disk size to any multiple of 5 GB by
    # setting the `diskSizeGB` property.
    #
    # diskSizeGB: 5
