# Use this Blueprint to deploy n8n on Render as a web
# service that uses a Postgres database to store
# workflow data.
#
# This Blueprint uses free instance types (specified by
# `plan`) for both the web service and the database. You
# can upgrade to paid instance types at any time to
# increase resources.

services:
  - type: web
    plan: free
    # This is the runtime for services that pull a prebuilt Docker image
    runtime: image
    # You can give the service any name
    name: n8n-service
    image:
      # Pulls the n8n image tagged as latest from Docker Hub
      url: docker.io/n8nio/n8n:latest

    # The path of the service's health check endpoint for zero-downtime deploys.
    healthCheckPath: /healthz

    # All environment variables defined below are required!
    #
    # You can define additional environment variables as needed.
    envVars:
      # Generates a base64-encoded key for
      # encrypting credentials in n8n
      #
      # Do not modify this value after it's generated!
      # If you do, you'll lose access to all credentials
      # encrypted with the previous value.
      - key: N8N_ENCRYPTION_KEY
        generateValue: true

      # Sets n8n to run all workflows in the main process to
      # optimize performance and reduce memory overhead.
      - key: EXECUTIONS_PROCESS
        value: main

      # Disables telemetry to reduce background overhead and network calls.
      - key: N8N_DIAGNOSTICS_ENABLED
        value: "false"

      # Disables version check notifications to further reduce background
      # CPU, memory, and network overhead.
      - key: N8N_VERSION_NOTIFICATIONS_ENABLED
        value: "false"

      # Offloads binary data from RAM to disk. This is critical for the 512MB
      # free tier to prevent OOM crashes when processing files, images, or
      # large payloads, ensuring stability during file-heavy workflows.
      - key: N8N_DEFAULT_BINARY_DATA_MODE
        value: filesystem

      # Optimized memory management for Render's 512MB free tier.
      # Setting max-old-space-size ensures Node.js triggers garbage collection
      # proactively, preventing OOM kills while leaving headroom for the stack.
      - key: NODE_OPTIONS
        value: --max-old-space-size=384

      # Enable more aggressive execution data pruning to keep the database lean.
      # This prevents the 1GB free tier database from filling up and maintains
      # high performance by reducing index size and query latency.
      - key: EXECUTIONS_DATA_PRUNE
        value: "true"
      - key: EXECUTIONS_DATA_MAX_AGE
        value: "168" # 7 days
      - key: EXECUTIONS_DATA_PRUNE_MAX_COUNT
        value: "1000"

      # These automatically populate connection details 
      # for the Render Postgres database defined below
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_DATABASE
        fromDatabase:
          name: n8n-db
          property: database
      - key: DB_POSTGRESDB_HOST
        fromDatabase:
          name: n8n-db
          property: host
      - key: DB_POSTGRESDB_PASSWORD
        fromDatabase:
          name: n8n-db
          property: password
      - key: DB_POSTGRESDB_USER
        fromDatabase:
          name: n8n-db
          property: user

      # Optimized database connection pool size for improved concurrency.
      # Increasing this from the default (2) to 5 reduces connection
      # acquisition latency and improves overall system throughput.
      # A value of 5 is used to stay within Render's free tier Postgres
      # connection limit.
      - key: DB_POSTGRESDB_POOL_SIZE
        value: "5"

      # Prevents the service from becoming unresponsive or crashing during
      # high-load periods by limiting concurrent production executions.
      # This prevents event loop thrashing and ensures each execution has
      # sufficient CPU and RAM. A value of 5 is used to align with the
      # database connection pool size.
      - key: N8N_CONCURRENCY_PRODUCTION_LIMIT
        value: "5"

      # The default port n8n listens on.
      # Explicitly setting this speeds up your first deploy!
      - key: PORT
        value: 5678

      # If you use webhook nodes, set this manually to your service URL
      # (e.g., https://n8n-service-q975.onrender.com/) after deployment.
      # You can find your service URL in the Render Dashboard under the
      # "Connect" button or at the top of the service page.
      # - key: WEBHOOK_URL
      #   value: https://replace-with-your-url.onrender.com/

databases:
  - name: n8n-db
    plan: free # Note: Free databases expire and are DELETED after 90 days.
    # The free instance type is limited to 1 GB of disk
    # space.
    #
    # If you later upgrade to a paid instance type, you can
    # increase the disk size to any multiple of 5 GB by
    # setting the `diskSizeGB` property.
    #
    # diskSizeGB: 5
